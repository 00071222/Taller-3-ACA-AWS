<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura DevOps con Cloudflare y AWS</title>
  <desc id="desc">Flujo desde usuarios hacia Cloudflare, servicios de AWS y prácticas DevOps.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect width="1280" height="620" rx="28" fill="url(#bg)"/>
  <text x="640" y="58" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">Arquitectura DevOps con AWS y Cloudflare</text>
  <text x="640" y="92" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">Entrega, seguridad, infraestructura y observabilidad</text>

  <g filter="url(#shadow)">
    <rect x="70" y="205" width="235" height="170" rx="22" fill="#ffffff"/>
    <circle cx="187" cy="248" r="28" fill="#e2e8f0"/>
    <path d="M170 251c0-10 8-18 18-18s18 8 18 18-8 18-18 18-18-8-18-18zm-20 69c4-24 20-38 38-38s34 14 38 38" fill="none" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
    <text x="187" y="346" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Usuarios</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="405" y="155" width="300" height="270" rx="22" fill="#f97316"/>
    <text x="555" y="210" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Cloudflare</text>
    <line x1="450" y1="235" x2="660" y2="235" stroke="#fed7aa" stroke-width="2"/>
    <text x="555" y="278" text-anchor="middle" fill="#fff7ed" font-family="Arial, sans-serif" font-size="20">DNS y Proxy</text>
    <text x="555" y="318" text-anchor="middle" fill="#fff7ed" font-family="Arial, sans-serif" font-size="20">TLS y CDN</text>
    <text x="555" y="358" text-anchor="middle" fill="#fff7ed" font-family="Arial, sans-serif" font-size="20">WAF y Rate Limiting</text>
    <text x="555" y="398" text-anchor="middle" fill="#ffedd5" font-family="Arial, sans-serif" font-size="16">Capa pública y de protección</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="805" y="135" width="405" height="310" rx="22" fill="#ffffff"/>
    <text x="1008" y="192" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="700">AWS</text>
    <rect x="845" y="225" width="145" height="75" rx="14" fill="#e0f2fe"/>
    <text x="918" y="270" text-anchor="middle" fill="#075985" font-family="Arial, sans-serif" font-size="19" font-weight="700">EC2 / ALB</text>
    <rect x="1025" y="225" width="145" height="75" rx="14" fill="#dcfce7"/>
    <text x="1098" y="270" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="19" font-weight="700">S3</text>
    <rect x="845" y="330" width="145" height="75" rx="14" fill="#f3e8ff"/>
    <text x="918" y="375" text-anchor="middle" fill="#6b21a8" font-family="Arial, sans-serif" font-size="19" font-weight="700">RDS</text>
    <rect x="1025" y="330" width="145" height="75" rx="14" fill="#fef3c7"/>
    <text x="1098" y="375" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="18" font-weight="700">CloudWatch</text>
  </g>

  <line x1="305" y1="290" x2="395" y2="290" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="705" y1="290" x2="795" y2="290" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="350" y="500" width="580" height="78" rx="20" fill="#0ea5e9"/>
    <text x="640" y="533" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">DevOps: Git · CI/CD · IaC · Secretos · Monitoreo · Runbooks</text>
    <text x="640" y="562" text-anchor="middle" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="16">Automatización y operación de extremo a extremo</text>
  </g>
</svg>
