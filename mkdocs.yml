site_name: Guía DevOps Cloud con AWS y Cloudflare
site_description: Ruta práctica para que un profesional DevOps comience a desplegar, proteger y operar aplicaciones web en AWS y Cloudflare.
site_author: Brian Carranza

repo_name: devops-cloud-aws-cloudflare

nav:
  - Inicio: index.md
  - Fundamentos cloud: fundamentos-cloud.md
  - Primer despliegue: primer-despliegue.md
  - Operación y seguridad: operacion-seguridad.md
  - Entorno MkDocs: entorno-mkdocs.md


theme:
  name: material
  language: es
  features:
    #- navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
  palette:
    # Tema claro del sistema
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro

    # Tema oscuro del sistema
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro


plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
